#==============================================================================
# General Behavior
#==============================================================================

# VimのEscキー入力の遅延を解消するための必須設定
set-option -sg escape-time 0

# tmuxペイン内に渡すTERM。モダンなターミナルではtmux-256colorが推奨される
set-option -g default-terminal "tmux-256color"

# 外側のターミナル別に機能フラグを追加
# - Alacritty: 24-bit RGB
# - WezTerm: 24-bit RGB + OSC52クリップボード + OSC8ハイパーリンク
# - Terminal.app: 256色のみ(機能追加なし)
set-option -ag terminal-features ",alacritty:RGB"
set-option -ag terminal-features ",wezterm:RGB,wezterm:clipboard,wezterm:hyperlinks"

# スクロールバックバッファの履歴行数を増やす
set-option -g history-limit 50000

# マウス操作を有効化する
set-option -g mouse on

# viモードでの選択・コピー
set-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle  # 矩形選択

# Vimとの連携のためフォーカスイベントを有効にする
set-option -g focus-events on

# macOS かつ im-select が見つかる場合だけ有効化
if-shell 'test "$(uname -s)" = "Darwin" && ${SHELL:-/bin/zsh} -lc "command -v im-select >/dev/null 2>&1"' {
  set-option -g @ime_force_abc '${SHELL:-/bin/zsh} -lc "im-select com.apple.keylayout.ABC >/dev/null 2>&1"'
  set-hook -g client-focus-in     'run-shell -b "#{@ime_force_abc}"'
  set-hook -g pane-focus-in       'run-shell -b "#{@ime_force_abc}"'
  set-hook -g after-select-pane   'run-shell -b "#{@ime_force_abc}"'
  set-hook -g after-select-window 'run-shell -b "#{@ime_force_abc}"'
}

# インデックスを1始まりに
set-option -g base-index 1
set-window-option -g pane-base-index 1

# ウィンドウを閉じた時に番号を詰める
set-option -g renumber-windows on

# メッセージ表示時間を3秒に
set-option -g display-time 3000

#==============================================================================
# Status Line Style 
#==============================================================================

# ステータスバーの更新間隔(秒)
set-option -g status-interval 1

# 表示位置
set-option -g status-position top

# ウィンドウ一覧の配置
set-option -g status-justify centre

# ステータスライン全体のスタイル
set-option -g status-style "fg=#d7d7d7,bg=#043864"

# --- 左側セクション ---
# [S: セッション名] の形式で表示
set-option -g status-left-length 30
set-option -g status-left "#[fg=#0091cc,bg=#001e51] S: #{session_name} #[default]"

# --- 中央セクション ---
# アクティブなウィンドウ
set-option -g window-status-current-style "fg=#a1d8e6,bg=#006a6c,bold"
set-option -g window-status-current-format " #{window_index}: #{window_name}#{?window_zoomed_flag, [Z],} "
# 非アクティブなウィンドウ
set-option -g window-status-style "fg=#839496,bg=#073642"
set-option -g window-status-format " #{window_index}: #{window_name}#{?window_zoomed_flag, [Z],} "

# 非アクティブウィンドウで出力があった時に検出
set-option -g monitor-activity on
# ステータスバーで通知
set-option -g visual-activity off
# 検出時のウィンドウ表示スタイル
set-window-option -g window-status-activity-style "fg=#f0908d,bg=#a61f24,bold"

# --- 右側セクション ---
# [日付 時:分] の形式で表示
set-option -g status-right-length 60
set-option -g status-right "#[fg=#93a1a1]%Y-%m-%d %H:%M #[default]"

# 端末のウィンドウタイトルにtmux情報を表示
set-option -g set-titles on
set-option -g set-titles-string "#{session_name} | #{window_index}:#{window_name}"

# 選択範囲
set-window-option -g mode-style "fg=#ffffff,bg=#2f7a4f"
# 通知
set-option -g message-style "fg=#00dcff,bg=#0a193c,bold"
# コマンドライン
set-option -g message-command-style "fg=#2b2b2b,bg=#7d7d7d,bold"

#==============================================================================
# Pane Style 
#==============================================================================
# 各ペインの上辺にタイトル表示枠を出す
set-option -g pane-border-status top
set-option -g pane-border-format " [#{pane_index}] #{pane_id} | #{pane_title} | #{pane_current_path} |"

# 非アクティブなペインの境界線の色
set-option -g pane-border-style fg="colour240"

# アクティブなペインの境界線の色
set-option -g pane-active-border-style fg="#40e0d0"

# ペイン境界線を太くする
set-option -g pane-border-lines heavy

# アクティブペインの境界に矢印インジケータを表示
set-option -g pane-border-indicators both

#==============================================================================
# Key Bindings
#==============================================================================

# Prefix Key
unbind-key C-b
set-option -g prefix C-a
# C-a を2回押すことでC-aそのものを入力できるようにする
bind-key C-a send-prefix

# 設定ファイル再読み込み
bind-key r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded!"

# | でペインを左右に分割する
bind-key | split-window -h -c "#{pane_current_path}"
# - でペインを上下に分割する
bind-key - split-window -v -c "#{pane_current_path}"

# Prefix + Tab: 次のウィンドウ
bind-key Tab next-window
# Prefix + Shift + Tab: 前のウィンドウ
bind-key BTab previous-window

# vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind-key -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind-key -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind-key -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

# システムクリップボードと連携（macOS）
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# ペインサイズ調整
bind-key -r H resize-pane -L 5
bind-key -r J resize-pane -D 5
bind-key -r K resize-pane -U 5
bind-key -r L resize-pane -R 5

# 履歴を消去
bind-key k clear-history \; display-message "history cleared"

# コピーモードに入る
bind-key Enter copy-mode

# 既定のnext-layout(Prefix + Space)を解除
unbind-key Space
# レイアウト構成を巡回
bind-key Space run-shell "~/dotfiles/tmux/scripts/tmux-layout-cycle.sh"
# レイアウトに直接切り替え
bind-key F1 run-shell "~/dotfiles/tmux/scripts/tmux-layout-cycle.sh 0"
bind-key F2 run-shell "~/dotfiles/tmux/scripts/tmux-layout-cycle.sh 1"

# 4ペイン構成ウィンドウを展開
bind-key C {
  new-window -c "#{pane_current_path}" -n "#{b:pane_current_path}"
  split-window -v -l 50% -c "#{pane_current_path}"
  split-window -h -t :.1 -l 50% -c "#{pane_current_path}"
  split-window -h -t :.3 -l 50% -c "#{pane_current_path}"
  select-pane -t :.1
}

# 全ペインにpane_idをタイトルとして付ける
bind-key R run-shell "tmux list-panes -a -F '##{pane_id}' | xargs -I {} tmux select-pane -t {} -T {}"
# 現在のペインに任意のタイトルを付ける
bind-key T command-prompt -p "Pane title:" "select-pane -T '%%'"

# 指定履歴をコピー
bind-key X command-prompt -p "Start line:,Capture pane id:" -I "-1000,%" "run-shell 'tmux capture-pane -p -t %2 -S %1 | pbcopy'"

# 指定ペインの履歴を/tmp/tmux-capture.txtに保存
bind-key E command-prompt -p "Start line:,Capture pane id:" -I "-1000,%" "run-shell 'tmux capture-pane -p -t %2 -S %1 > /tmp/tmux-capture.txt'"

# ポップアップ起動
bind-key P display-popup -E -w 80% -h 90% -d "#{pane_current_path}" -T "[#{session_name}] Window:#{window_index} Index:#{pane_index} Pane:#{pane_id} [:#{pane_current_command}]" "$SHELL"
bind-key F display-popup -E -w 80% -h 80% -d "#{pane_current_path}" "find . -type f -not -path '*/.*' | fzf | pbcopy"
