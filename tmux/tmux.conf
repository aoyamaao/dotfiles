#==============================================================================
# 1. General Behavior
#==============================================================================

# VimのEscキー入力の遅延を解消するための必須設定
set-option -sg escape-time 0

# 256色表示を有効にするための設定。モダンなターミナルではtmux-256colorが推奨される
set-option -g default-terminal "tmux-256color"

# Alacrittyで24-bit true colorとイタリック体を正しく扱うための設定
set-option -g terminal-overrides ",alacritty:Tc,screen-256color:Tc"

# スクロールバックバッファの履歴行数を増やす
set-option -g history-limit 50000

# マウス操作を有効化する
set-option -g mouse on

# コピーモードのキーバインドをviスタイルにする
set-window-option -g mode-keys vi

# Vimとの連携のためフォーカスイベントを有効にする
set-option -g focus-events on

# インデックスを1始まりに
set -g base-index 1
setw -g pane-base-index 1

# ウィンドウを閉じた時に番号を詰める
set -g renumber-windows on

#==============================================================================
# 2. Status Line Style 
#==============================================================================
# ステータスバーの更新間隔（秒）
set-option -g status-interval 1

# ウィンドウリストを中央揃えにする
set-option -g status-justify centre

# ステータスライン全体のスタイル
set-option -g status-style "fg=#a3b215,bg=#043864"

# --- 左側セクション ---

# [S: セッション名] の形式で表示
set-option -g status-left-length 30
set-option -g status-left "#[fg=#0091cc,bg=#001e51] S: #S #[default]"

# --- 右側セクション ---
# [日付 時:分] の形式で表示
set-option -g status-right-length 60
set-option -g status-right "#[fg=#93a1a1]%Y-%m-%d %H:%M #[default]"

# --- ウィンドウリストのスタイル ---
# アクティブなウィンドウのスタイル
set-option -g window-status-current-style "fg=#a1d8e6,bg=#006a6c,bold"
# アクティブなウィンドウのフォーマット（インデックス:ウィンドウ名）
set-option -g window-status-current-format " #I: #W "

# 非アクティブなウィンドウのスタイル
set-option -g window-status-style "fg=#839496,bg=#073642"
# 非アクティブなウィンドウのフォーマット
set-option -g window-status-format " #I: #W "

# --- Pane Borders ---
# 非アクティブなペインの境界線の色
set-option -g pane-border-style fg="colour240"

# アクティブなペインの境界線の色
set-option -g pane-active-border-style fg="#40E0D0"

#==============================================================================
# 3. Key Bindings
#==============================================================================

# --- Prefix Key ---
unbind-key C-b
set-option -g prefix C-a
# C-a を2回押すことでC-aそのものを入力できるようにする
bind-key C-a send-prefix

# --- Pane Splitting ---
# | でペインを左右に分割する
bind-key | split-window -h -c "#{pane_current_path}"
# - でペインを上下に分割する
bind-key - split-window -v -c "#{pane_current_path}"

# 通常の新規ウィンドウ作成時にも命名を強制する（Prefix + c）
bind-key c command-prompt -p "Window name:" {
  new-window -c "#{pane_current_path}" -n "%1"
}

# 3ペイン構成を展開しつつ命名する（Prefix + C）
bind-key C command-prompt -I "default-name" -p "Window name (3-pane):" {
  new-window -c "#{pane_current_path}" -n "%1"
  split-window -h -l 20% -c "#{pane_current_path}"
  split-window -v -l 50% -c "#{pane_current_path}"
  select-pane -t :.0
}

# --- Config Reload ---
# Prefix + r で設定ファイルを即座に再読み込みする
bind-key r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded!"

# --- vim-tmux-navigator ---
# Vimのウィンドウとtmuxのペインをプレフィックス無しでシームレスに移動する
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind-key -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind-key -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind-key -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

#==============================================================================
# 4. Plugin Management (tpm)
#==============================================================================

# --- Plugin List ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'

# --- Plugin Settings ---
# tmux起動時に以前のセッションを自動で復元する
set -g @continuum-restore 'on'

# --- tpm Initializer ---
# この行は必ず.tmux.confの最後に記述する
run '~/.tmux/plugins/tpm/tpm'
